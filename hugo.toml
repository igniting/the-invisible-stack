baseURL = "https://igniting.github.io/the-invisible-stack/"
languageCode = "en-us"
title = "The Harness"
theme = "hugo-book"

disablePathToLower = true

[pagination]
  pagerSize = 20

[params]
  BookTheme = "auto"
  BookSection = "book"
  BookToC = true
  BookSearch = true
  BookComments = false
  BookDateFormat = "January 2, 2006"
  BookServiceWorker = false

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
  [markup.highlight]
    style = "github"
    noClasses = false
