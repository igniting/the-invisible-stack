baseURL = "https://igniting.github.io/the-invisible-stack/"
languageCode = "en-us"
title = "The Harness"

disablePathToLower = true

[params]
  subtitle = "The Trust Boundary Between AI and the Real World"
  description = "A practitioner's guide to building AI agents that act in the world safely and accountably — the orchestration layer, the execution layer, and the trust layer most teams forget to build."

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.parser.attribute]
    block = true
  [markup.highlight]
    style = "github"
    noClasses = false
