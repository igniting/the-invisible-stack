baseURL = "https://igniting.github.io/the-invisible-stack/"
languageCode = "en-us"
title = "The Invisible Stack"

disablePathToLower = true

[params]
  subtitle = "The Hidden Infrastructure of AI Agents"
  description = "A practitioner's guide to the hidden infrastructure of AI agents — the orchestration layer, the execution layer, and the trust layer most teams forget to build."

[markup]
